<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 – Page Not Found | Beamable Docs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 640px;
    }

    /* ── Glitch 404 ── */
    .glitch-wrap {
      position: relative;
      display: inline-block;
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .glitch-layer { display: block; user-select: none; }

    .layer-main { color: #58a6ff; position: relative; z-index: 2; }

    .layer-r, .layer-g {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
    }
    .layer-r { color: #f78166; opacity: 0.75; }
    .layer-g { color: #3fb950; opacity: 0.75; }

    /* ── Subtitle + message ── */
    .subtitle {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #3fb950;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .message {
      margin-top: 2rem;
      font-size: 1rem;
      color: #8b949e;
      line-height: 1.7;
    }

    .message code {
      color: #f78166;
      background: #161b22;
      padding: 0.1em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    /* ── CRT terminal ── */
    @keyframes crt-flicker {
      0%, 94%, 100% { opacity: 1; }
      95%           { opacity: 0.88; }
      96.5%         { opacity: 0.96; }
      97%           { opacity: 0.85; }
      98%           { opacity: 0.97; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .crt-wrap {
      margin-top: 2.5rem;
      position: relative;
    }

    /* "NOT REAL" badge above the screen */
    .crt-badge {
      display: inline-block;
      margin-bottom: 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3fb950;
      opacity: 0.55;
    }

    .crt-screen {
      position: relative;
      background: #030a03;
      border: 1.5px solid #1c2e1c;
      border-radius: 6px;
      padding: 1.1rem 1.4rem 1.2rem;
      text-align: left;
      font-size: 0.82rem;
      line-height: 2;
      color: #33ff57;
      text-shadow: 0 0 5px #33ff57, 0 0 14px rgba(51,255,87,0.35);
      box-shadow:
        inset 0 0 80px rgba(0,0,0,0.6),
        inset 0 0 24px rgba(51,255,87,0.04),
        0 0 18px rgba(51,255,87,0.1),
        0 0 1px #1c2e1c;
      overflow: hidden;
      animation: crt-flicker 9s ease-in-out infinite;
    }

    /* Scanlines */
    .crt-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.28) 2px,
        rgba(0,0,0,0.28) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Top-of-screen glare */
    .crt-screen::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.025), transparent);
      border-radius: 6px 6px 0 0;
      pointer-events: none;
      z-index: 4;
    }

    .crt-header {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      opacity: 0.5;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
    }

    .crt-divider {
      border: none;
      border-top: 1px solid rgba(51,255,87,0.18);
      margin: 0.35rem 0 0.55rem;
    }

    .crt-line { display: block; }

    .crt-line.action::before { content: '> '; opacity: 0.6; }

    .crt-line.result {
      opacity: 0.85;
      padding-left: 1.2rem;
    }

    .crt-line.suggest {
      opacity: 0.65;
      padding-left: 1.2rem;
    }

    .cursor {
      display: inline-block;
      width: 0.52em;
      height: 0.9em;
      background: #33ff57;
      box-shadow: 0 0 6px #33ff57;
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }

    /* ── Links ── */
    .links {
      margin-top: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .links a {
      display: inline-block;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.875rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .links a.primary { background: #1f6feb; color: #fff; }
    .links a.primary:hover { background: #388bfd; }

    .links a.secondary {
      background: rgba(22, 27, 34, 0.85);
      color: #8b949e;
      border: 1px solid #30363d;
      backdrop-filter: blur(4px);
    }
    .links a.secondary:hover { color: #e6edf3; border-color: #58a6ff; }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>

  <div class="content">
    <div class="glitch-wrap">
      <span class="glitch-layer layer-r" id="gl-r">404</span>
      <span class="glitch-layer layer-main" id="gl-m">404</span>
      <span class="glitch-layer layer-g" id="gl-g">404</span>
    </div>

    <div class="subtitle">Page not found</div>

    <p class="message">
      The page at <code id="bad-path"></code> doesn't exist.<br>
      <span id="tagline"></span>
    </p>

    <div class="crt-wrap">
      <div class="crt-badge">✦ simulated readout — not a real error ✦</div>
      <div class="crt-screen">
        <div class="crt-header">◈ beamable nav-sys v2.4.0 — diagnostic terminal ◈</div>
        <hr class="crt-divider">
        <span class="crt-line action"  id="msg-action"></span>
        <span class="crt-line result"  id="msg-error"></span>
        <span class="crt-line suggest" id="msg-suggest"></span>
        <span class="cursor"></span>
      </div>
    </div>

    <div class="links">
      <a class="primary"   href="/Docs/Unity-Latest/">Unity Docs</a>
      <a class="secondary" href="/Docs/Unreal-Latest/">Unreal Docs</a>
      <a class="secondary" href="/Docs/WebSDK-Latest/">WebSDK Docs</a>
      <a class="secondary" href="/Docs/CLI-Latest/">CLI Docs</a>
    </div>
  </div>

  <script>
    // ── Bad path ───────────────────────────────────────────────────────────────
    document.getElementById('bad-path').textContent = window.location.pathname;

    // ── Random taglines ────────────────────────────────────────────────────────
    const TAGLINES = [
      "You've drifted into uncharted space.",
      "These are not the docs you're looking for.",
      "Your ship has wandered clean off the map.",
      "No beacons detected in this sector.",
      "This page was lost in a warp anomaly.",
      "Congratulations — you've discovered nothing.",
      "The void stares back.",
      "There's nothing here but starlight and regret.",
      "Scanning for signs of intelligent content… none found.",
      "Reality not found at this address.",
      "You've reached the edge of the known universe.",
      "Even the map doesn't know where this is.",
      "Signal lost. Coordinates unknown. Coffee recommended.",
      "This is fine. Everything is fine. There is no page.",
      "You have unlocked: the Nowhere Achievement.",
    ];

    document.getElementById('tagline').textContent =
      TAGLINES[Math.floor(Math.random() * TAGLINES.length)];

    // ── Random terminal messages ───────────────────────────────────────────────
    const MESSAGES = [
      { action: 'Scanning known sectors…',
        error:  'ERROR — coordinate not in registry',
        suggest:'Suggested action: return to base' },
      { action: 'Querying navigation database…',
        error:  'MISS — destination unreachable',
        suggest:'Initiating reroute sequence' },
      { action: 'Resolving beacon signal…',
        error:  'TIMEOUT — beacon offline for 404ms',
        suggest:'Attempting emergency handshake' },
      { action: 'Pinging relay node…',
        error:  'UNREACHABLE — signal lost in transit',
        suggest:'Falling back to last known position' },
      { action: 'Triangulating coordinates…',
        error:  'FAILED — location outside mapped space',
        suggest:'Plotting course to nearest hub' },
      { action: 'Loading sector manifest…',
        error:  'CORRUPT — manifest not found at this path',
        suggest:'Falling back to cached index' },
      { action: 'Authenticating access token…',
        error:  'REJECTED — route does not exist',
        suggest:'Try a valid coordinate' },
      { action: 'Deploying nav beacon…',
        error:  'NULL — object reference missing',
        suggest:'Clearing debris field and retrying' },
      { action: 'Syncing game state…',
        error:  'DESYNC — timeline mismatch at this URL',
        suggest:'Resynchronizing with server' },
      { action: 'Searching documentation index…',
        error:  '404 — page evicted from cache',
        suggest:'Rebuilding sector map' },
      { action: 'Running deep scan…',
        error:  'ANOMALY — path leads to void',
        suggest:'Quarantining corrupted route' },
      { action: 'Contacting Beamable HQ…',
        error:  'NO SIGNAL — transmission lost in hyperspace',
        suggest:'Broadcasting on backup frequency' },
      { action: 'Checking spawn registry…',
        error:  'EMPTY — no respawn point registered here',
        suggest:'Return to main lobby' },
      { action: 'Executing pathfinder…',
        error:  'DEAD END — route was decommissioned',
        suggest:'Suggest alternate vector' },
      { action: 'Compiling route table…',
        error:  'FATAL — recursion depth exceeded at this path',
        suggest:'Stack unwound to safe origin' },
    ];

    const msg = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
    document.getElementById('msg-action').textContent  = msg.action;
    document.getElementById('msg-error').textContent   = msg.error;
    document.getElementById('msg-suggest').textContent = msg.suggest;

    // ── Star field (zoom warp) ─────────────────────────────────────────────────
    const canvas = document.getElementById('starfield');
    const ctx    = canvas.getContext('2d');
    let W, H, CX, CY;

    const STAR_COUNT = 100;
    const BASE_SPEED = 0.5;
    const DEPTH      = 900;
    const stars      = [];

    function mkStar() {
      const angle     = Math.random() * Math.PI * 2;
      const z         = 50 + Math.random() * (DEPTH * 0.9 - 50); // full range every time
      const dist      = Math.random() * z * 0.03; // wider spread
      const rnd       = Math.random();
      const tint      = rnd < 0.12 ? 'warm' : rnd < 0.28 ? 'cool' : 'white';
      const speedMult = 0.5 + Math.random() * 1.1; // per-star speed variation decorrelates arrivals
      return { x: Math.cos(angle) * dist, y: Math.sin(angle) * dist, z, pz: z, tint, speedMult };
    }

    function resize() {
      W  = canvas.width  = window.innerWidth;
      H  = canvas.height = window.innerHeight;
      CX = W / 2;
      CY = H / 2;
    }

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < STAR_COUNT; i++) stars.push(mkStar());
    }

    function starColor(tint, bright) {
      const b = Math.floor(bright);
      if (tint === 'warm') return `rgb(${b},${Math.floor(b*0.82)},${Math.floor(b*0.45)})`;
      if (tint === 'cool') return `rgb(${Math.floor(b*0.72)},${Math.floor(b*0.88)},${b})`;
      return `rgb(${b},${b},${b})`;
    }

    function drawStars() {
      ctx.fillStyle = 'rgba(13,17,23,0.28)';
      ctx.fillRect(0, 0, W, H);

      // Radial fog
      const fog = ctx.createRadialGradient(CX, CY, W * 0.15, CX, CY, W * 0.75);
      fog.addColorStop(0,   'rgba(13,17,23,0)');
      fog.addColorStop(0.6, 'rgba(10,14,30,0.18)');
      fog.addColorStop(1,   'rgba(6,10,24,0.72)');
      ctx.fillStyle = fog;
      ctx.fillRect(0, 0, W, H);

      // Drifting nebula glow
      const t      = performance.now() * 0.00018;
      const nx     = CX + Math.sin(t * 0.7) * W * 0.12;
      const ny     = CY + Math.cos(t * 0.5) * H * 0.10;
      const nebula = ctx.createRadialGradient(nx, ny, 0, nx, ny, W * 0.45);
      nebula.addColorStop(0,   'rgba(30,50,120,0.07)');
      nebula.addColorStop(0.5, 'rgba(20,80,100,0.04)');
      nebula.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = nebula;
      ctx.fillRect(0, 0, W, H);

      for (const s of stars) {
        s.pz = s.z;
        s.z -= (BASE_SPEED + (1 - s.z / DEPTH) * BASE_SPEED * 1.5) * s.speedMult;

        if (s.z <= 1) { Object.assign(s, mkStar()); continue; }

        const sx = (s.x / s.z) * W + CX;
        const sy = (s.y / s.z) * H + CY;
        const px = (s.x / s.pz) * W + CX;
        const py = (s.y / s.pz) * H + CY;

        if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) {
          Object.assign(s, mkStar()); continue;
        }

        const progress = 1 - s.z / DEPTH;
        const size     = 0.3 + progress * 1.4;
        const bright   = 55 + progress * 100;

        ctx.strokeStyle = starColor(s.tint, bright);
        ctx.lineWidth   = size;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(sx, sy);
        ctx.stroke();
      }

      requestAnimationFrame(drawStars);
    }

    // Only update dimensions on resize — reinitialising stars causes a burst
    window.addEventListener('resize', resize);
    resize();
    initStars();
    drawStars();

    // ── Glitch effect ──────────────────────────────────────────────────────────
    const glR = document.getElementById('gl-r');
    const glM = document.getElementById('gl-m');
    const glG = document.getElementById('gl-g');

    function resetGlitch() {
      glR.style.transform = glG.style.transform = glM.style.transform = '';
      glR.style.clipPath  = glG.style.clipPath  = '';
      glR.style.opacity   = glG.style.opacity   = '0.75';
    }

    function scheduleGlitch() {
      const pause = Math.random() < 0.7
        ? 300  + Math.random() * 900
        : 1200 + Math.random() * 2000;
      setTimeout(runGlitch, pause);
    }

    function runGlitch() {
      const intensity = 0.15 + Math.random() * 0.85;
      const duration  = Math.random() < 0.6
        ? 40  + Math.random() * 120
        : 200 + Math.random() * 500;
      const chain = Math.random() < 0.25;
      const start = performance.now();

      function frame(now) {
        const elapsed = now - start;

        if (elapsed >= duration) {
          resetGlitch();
          chain ? setTimeout(runGlitch, 40 + Math.random() * 100) : scheduleGlitch();
          return;
        }

        const env = Math.sin((elapsed / duration) * Math.PI);
        const mag = intensity * env;

        glR.style.transform = `translate(${(Math.random()-0.5)*44*mag}px, 0)`;
        glG.style.transform = `translate(${(Math.random()-0.5)*44*mag}px, 0)`;
        glM.style.transform = `translate(${(Math.random()-0.5)*10*mag}px, ${(Math.random()-0.5)*8*mag}px)`;

        if (Math.random() < 0.55) {
          const t1 = Math.random() * 75, t2 = t1 + 8 + Math.random() * 35;
          glR.style.clipPath = `inset(${t1}% 0 ${100-t2}% 0)`;
        } else { glR.style.clipPath = ''; }

        if (Math.random() < 0.55) {
          const t1 = Math.random() * 75, t2 = t1 + 8 + Math.random() * 35;
          glG.style.clipPath = `inset(${t1}% 0 ${100-t2}% 0)`;
        } else { glG.style.clipPath = ''; }

        if (Math.random() < 0.2 * mag) {
          glR.style.opacity = (0.3 + Math.random() * 0.7).toFixed(2);
          glG.style.opacity = (0.3 + Math.random() * 0.7).toFixed(2);
        } else {
          glR.style.opacity = glG.style.opacity = '0.75';
        }

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }

    scheduleGlitch();
  </script>
</body>
</html>
