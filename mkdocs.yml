site_name: Unity SDK
site_url: https://beamable.github.io/Docs/
theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/beamable-badge.png
  features:
    - header.autohide
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.superfences
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - md_in_html
  - attr_list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: ¶
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
        
plugins:
   - glightbox
   - search
   - autorefs
   - mike
   - literate-nav:
      nav_file: SUMMARY.md

copyright: |
  &copy; 2025 <a href="https://beamable.com"  target="_blank" rel="noopener">Beamable</a>, made with <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank" rel="noopener">Material for MkDocs</a>
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/beamable
      name: GitHub
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCM21fAotUddHG3fwrUV3ORg
      name: Youtube
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/beamable/
      name: Instagram
    - icon: fontawesome/brands/twitter
      link: https://x.com/Beamable
      name: X
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/BuiltOnBeamable
      name: Facebook
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/beamable/
      name: LinkedIn
    - icon: fontawesome/brands/tiktok
      link: https://www.tiktok.com/@buildonbeamable
      name: TikTok
    - icon: fontawesome/solid/link
      link: https://beamable.com
      name: Website
  version:
    provider: mike

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js